                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
        );

        const ReviewCard = ({ review }) => (
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-3 transition-all hover:shadow-md">
                <div className="flex justify-between items-start">
                    <div className="flex flex-col">
                        <div className="flex mb-1">
                            {[1, 2, 3, 4, 5].map((s) => (
                                <StarIcon key={s} filled={s <= review.rating} />
                            ))}
                        </div>
                        <span className="text-sm font-bold text-gray-400">{review.user} | {review.date}</span>
                    </div>
                </div>
                <p className="text-base text-gray-700 leading-relaxed font-medium">{review.comment}</p>
            </div>
        );

        const OrderForm = () => {
            const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/1R81fz4Jm2qRHJkVvw5n1beop2h8IsBgFM2Xjn3ZogdI/formResponse';
            const FORM_ENTRY_IDS = { name: '242227916', phone: '1630132293' };

            const [formData, setFormData] = useState({ name: '', phone: '', agreed: true });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);
            const [showPrivacyModal, setShowPrivacyModal] = useState(false);

            const handlePhoneChange = (e) => {
                const value = e.target.value.replace(/[^0-9]/g, '');
                let formatted = value;
                if (value.length > 3 && value.length <= 7) formatted = value.slice(0, 3) + '-' + value.slice(3);
                else if (value.length > 7) formatted = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
                setFormData({ ...formData, phone: formatted });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                
                const body = new URLSearchParams();
                body.append('entry.' + FORM_ENTRY_IDS.name, formData.name);
                body.append('entry.' + FORM_ENTRY_IDS.phone, formData.phone);
                
                try {
                    await window.fetch(GOOGLE_FORM_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: body.toString(),
                    });

                    setIsSuccess(true);
                } catch (err) {
                    alert('접수 중 오류가 발생했습니다.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (isSuccess) return (
                <div className="text-center py-12 px-8 bg-gray-50 rounded-[40px] border border-gray-100 animate-fade-in">
                    <div className="w-16 h-16 bg-blue-600 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-100 text-2xl">✓</div>
                    <h3 className="text-2xl font-black mb-3">상담 신청 완료</h3>
                    <p className="text-sm text-gray-500 mb-10 leading-relaxed">정상적으로 접수되었습니다.<br/>곧 전문가가 연락드릴 예정입니다.</p>
                    <button type="button" onClick={() => setIsSuccess(false)} className="bg-white px-12 py-3 rounded-2xl border border-gray-200 text-sm font-black shadow-sm active:scale-95 transition-all">돌아가기</button>
                </div>
            );

            return (
                <form onSubmit={handleSubmit} className="space-y-6 text-left">
                    <input 
                        type="text" 
                        required 
                        placeholder="성함을 입력하세요" 
                        className="w-full h-16 bg-gray-50 rounded-2xl px-6 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-gray-900 shadow-inner" 
                        value={formData.name} 
                        onChange={(e) => setFormData({ ...formData, name: e.target.value })} 
                    />
                    <input 
                        type="tel" 
                        required 
                        placeholder="휴대폰 번호 (010-0000-0000)" 
                        maxLength={13} 
                        className="w-full h-16 bg-gray-50 rounded-2xl px-6 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-gray-900 shadow-inner" 
                        value={formData.phone} 
                        onChange={handlePhoneChange} 
                    />
                    <div className="p-5 bg-gray-50 rounded-2xl border border-gray-100">
                        <label className="flex items-start gap-3 cursor-pointer group">
                            <input 
                                type="checkbox" 
                                required 
                                className="mt-1 w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500" 
                                checked={formData.agreed} 
                                onChange={(e) => setFormData({ ...formData, agreed: e.target.checked })} 
                            />
                            <div className="flex-1">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs font-black text-gray-700">개인정보 수집 및 이용 동의 [필수]</span>
                                    <button type="button" onClick={() => setShowPrivacyModal(true)} className="text-[10px] font-bold text-blue-600 underline underline-offset-2">상세보기</button>
                                </div>
                                <p className="text-[10px] text-gray-400">보험 상담 서비스를 위한 필수 정보 수집에 동의합니다.</p>
                                <p className="text-[12px] text-gray-400 mt-2 leading-relaxed border-t border-gray-100 pt-2">
                                    <strong className="text-gray-600 block mb-1">승환계약 시 유의문구</strong>
                                    보험계약자가 기존 보험을 해지하고, 새로운 보험계약을 체결하는 과정에서<br/>
                                    ① 질병이력, 연령증가 등으로 가입이 거절되거나, 보험료가 인상될 수 있습니다.<br/>
                                    ② 가입 상품에 따라 새로운 면책기간 적용 및 보장 제한 등 기타 불이익이 발생할 수 있습니다.
                                </p>
                            </div>
                        </label>
                    </div>
                    <button 
                        type="submit" 
                        disabled={isSubmitting} 
                        className="w-full h-16 bg-blue-600 text-white font-black text-lg rounded-2xl shadow-xl shadow-blue-100 active:scale-95 transition-all flex items-center justify-center"
                    >
                        {isSubmitting ? (
                            <div className="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                        ) : '무료 진단 및 상담 신청'}
                    </button>
                    {showPrivacyModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm animate-fade-in">

                                <div className="flex justify-between items-center mb-6">
                                    <h4 className="text-xl font-black">개인정보 수집 동의</h4>
                                    <button type="button" onClick={() => setShowPrivacyModal(false)} className="text-gray-400">✕</button>
                                </div>

                                        <p>{PRIVACY_POLICY_DETAIL.purpose}</p>
                                    </section>
                                    <section>
                                        <p className="font-black text-gray-900 mb-1">2. 수집하는 항목</p>
                                        <p>{PRIVACY_POLICY_DETAIL.items}</p>
                                    </section>
                                    <section>
                                        <p className="font-black text-gray-900 mb-1">3. 보유 및 이용 기간</p>
                                        <p>{PRIVACY_POLICY_DETAIL.period}</p>
                                    </section>
                                </div>
                                <button type="button" onClick={() => setShowPrivacyModal(false)} className="w-full bg-gray-900 text-white py-4 rounded-2xl font-black active:scale-95 transition-all">확인했습니다</button>
                            </div>
                        </div>
                    )}
                </form>
            );
        };

        // --- Main App ---

        const App = () => {

                    <main className="w-full max-w-[500px] mx-auto pt-40 pb-20 px-8 text-center">

                            <p className="text-[15px] text-gray-500 font-bold mb-16 leading-relaxed">{SITE_INFO.subtitle}</p>
                            <button 
                                onClick={scrollToOrder} 
                                className="w-full bg-blue-600 text-white font-black py-5 rounded-[28px] text-[22px] shadow-2xl shadow-blue-100 active:scale-95 transition-all hover:bg-blue-700 mb-20"
                            >
                                지금 무료 진단 받기
                            </button>
                        </div>

                        <div ref={orderFormRef} className="w-full bg-white border border-gray-100 rounded-[40px] px-8 py-12 shadow-sm mb-12">
                            <div className="text-center mb-10">
                                <h2 className="text-[32px] font-black mb-3 tracking-tighter text-gray-900">진단 신청</h2>
                                <p className="text-gray-400 text-sm font-medium leading-relaxed">보험업법을 준수하며, 전문가가<br/>순차적으로 맞춤 분석을 도와드립니다.</p>
                            </div>
                            <OrderForm />
                        </div>

                        <section className="mb-24 text-center">
                            <div className="mb-12">
                                <h3 className="text-[26px] font-black text-gray-900 mb-2">고객 리얼 후기</h3>
                                <p className="text-sm text-gray-400 font-bold">많은 분들이 이미 경험하셨습니다</p>
                            </div>
                            <div className="space-y-4 text-left">
                                {REVIEWS.map((review) => (
                                    <ReviewCard key={review.id} review={review} />
                                ))}
                            </div>
                        </section>


                        <section className="mb-24">
                            <div className="grid grid-cols-2 gap-5">
                                {[
                                    { icon: 'BarChart3', label: '32개사 비교', desc: '국내 전 금융사' },
                                    { icon: 'TrendingDown', label: '30% 절감', desc: '평균 다이어트' },
                                    { icon: 'Search', label: '중복 체크', desc: '숨은 보장 찾기' },
                                    { icon: 'Shield', label: '책임 설계', desc: '1:1 전문가 매칭' }
                                ].map((item, i) => (
                                    <div key={i} className="bg-gray-50 border border-gray-100 p-7 rounded-[35px] text-center transition-all hover:bg-gray-100 flex flex-col items-center">
                                        <div className="text-blue-600 mb-3"><Icon name={item.icon} size={28} /></div>
                                        <div className="text-base font-black text-gray-900 mb-1">{item.label}</div>
                                        <div className="text-[12px] text-gray-400 font-bold uppercase tracking-tighter">{item.desc}</div>
                                    </div>
                                ))}
                            </div>
                        </section>

                    </main>

                    <footer className="w-full bg-gray-50 py-20 px-8 text-[14px] text-gray-400 leading-relaxed flex justify-center border-t border-gray-100">
                        <div className="w-full max-w-[500px]">
                            <div className="mb-10">
                                <p className="mb-4">
                                    상호명 : 메가주식회사 | 사업자번호 : 128-86-07154 | 대표이사 : 전형노, 송병태<br/>
                                    주소 : 서울 영등포구 영신로 166, 103호(영등포동6가, 영등포반도아이밸리) | Tel : 02-862-0737<br/>
                                    보험대리점등록번호 : 2005108004
                                </p>
                                <div className="flex gap-2 font-black my-6 text-gray-600 text-[14px]">
                                    <button onClick={() => setShowFullPrivacy(true)} className="hover:text-blue-600 transition-colors cursor-pointer">[개인정보처리방침]</button>
                                    <span className="opacity-20">|</span>
                                    <button onClick={() => setShowEssentialInfo(true)} className="hover:text-blue-600 transition-colors cursor-pointer">[필수안내사항]</button>
                                </div>
                                <div className="mt-10 pt-10 border-t border-gray-200 space-y-4 text-[16px] text-gray-500">
                                    <p className="font-black text-gray-900 text-[17px]">[보험 광고 및 계약 관련 필수 고지 사항]</p>
                                    <p>※ 상기 내용은 메가주식회사 의 의견이며, 계약체결에 따른 이익 또는 손실은 보험계약자 등에게 귀속됩니다.</p>
                                    <p>※ 메가주식회사 보험대리점(등록번호 제2005108004호)</p>
                                    <p>※ 보험설계사 이정우</p>
                                    <p>※ 생명보험협회등록번호 : 20241217401110</p>
                                    <p>※ 손해보험협회등록번호 : 20241217401110</p>
                                    <p>※ 보험계약자가 기존 보험계약을 해지하고 새로운 보험계약을 체결하는 과정에서<br/>
                                        ① 질병이력, 연령증가 등으로 가입이 거절되거나 보험료가 인상될 수 있습니다.<br/>
                                        ② 가입 상품에 따라 새로운 면책기간 적용 및 보장 제한 등 기타 불이익이 발생할 수 있습니다.</p>
                                    <p>광고심의필 제 0000-00-0000호(유효기간 0000.00.00~0000.00.00)</p>
                                    <p>※ 본 광고는 광고심의기준을 준수하였으며, 유효기간은 심의일로부터 1년입니다.</p>
                                </div>
                            </div>
                            <p className="border-t border-gray-200 pt-8 font-medium">Copyright © 2026 {SITE_INFO.name} All rights reserved.</p>
                        </div>
                    </footer>

                    {/* 모달 영역 */}
                    {showFullPrivacy && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white w-full max-w-[500px] rounded-[40px] p-8 shadow-2xl flex flex-col max-h-[85vh]">
                                <div className="flex justify-between items-center mb-6">
                                    <h4 className="text-2xl font-black">개인정보처리방침</h4>
                                    <button onClick={() => setShowFullPrivacy(false)} className="text-gray-400 text-xl p-2"><Icon name="X" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                    {FULL_PRIVACY_POLICY}
                                </div>
                                <div className="pt-8">
                                    <button onClick={() => setShowFullPrivacy(false)} className="w-full bg-gray-900 text-white py-5 rounded-2xl font-black active:scale-95 transition-all">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showEssentialInfo && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white w-full max-w-[500px] rounded-[40px] p-8 shadow-2xl flex flex-col max-h-[85vh]">
                                <div className="flex justify-between items-center mb-6">
                                    <h4 className="text-2xl font-black">필수안내사항</h4>
                                    <button onClick={() => setShowEssentialInfo(false)} className="text-gray-400 text-xl p-2"><Icon name="X" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                    {ESSENTIAL_INFO}
                                </div>
                                <div className="pt-8">
                                    <button onClick={() => setShowEssentialInfo(false)} className="w-full bg-gray-900 text-white py-5 rounded-2xl font-black active:scale-95 transition-all">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
